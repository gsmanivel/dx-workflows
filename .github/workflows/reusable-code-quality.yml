name: Reusable Code Quality Check

on:
  workflow_call:
    inputs:
      ai_review:
        description: 'Enable AI code review'
        required: false
        default: false
        type: boolean

jobs:
  code-quality:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Download DX org rulesets
        run: |
          mkdir -p config/pmd config/checkstyle
          curl -H "Cache-Control: no-cache" -o config/pmd/ruleset.xml \
            https://raw.githubusercontent.com/gsmanivel/dx-workflows/main/config/pmd/ruleset.xml
          curl -H "Cache-Control: no-cache" -o config/checkstyle/checkstyle.xml \
            https://raw.githubusercontent.com/gsmanivel/dx-workflows/main/config/checkstyle/checkstyle.xml

      - name: Run Maven verify
        run: mvn verify -Dsonar.skip=true -Dspotbugs.skip=true

      - name: Trigger AI Review
        if: success() && inputs.ai_review == true
        uses: gsmanivel/dx-workflows/actions/ai-review@main
        with:
          pr_number: ${{ github.event.pull_request.number }}
          repo_name: ${{ github.repository }}
